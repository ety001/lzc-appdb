params:
  - id: scm_type
    type: string
    name: "SCM 类型"
    description: "选择代码托管平台类型：gogs / github / gitlab / gitea / bitbucket"
    default_value: "gogs"

  - id: gogs_server
    type: string
    name: "Gogs 服务器地址"
    description: "Gogs 平台的完整访问地址。注意：如果 Gogs 部署在懒猫微服上，必须使用端口映射地址（如 http://局域网IP:端口），不能使用懒猫域名（*.heiyu.space），因为懒猫网关会拦截非浏览器请求. 如果你这是重装，记得删除之前在 Gogs 上有 Drone CI 创建的令牌."
    optional: true

  - id: github_client_id
    type: string
    name: "GitHub Client ID"
    description: "GitHub OAuth App 的 Client ID"
    optional: true

  - id: github_client_secret
    type: secret
    name: "GitHub Client Secret"
    description: "GitHub OAuth App 的 Client Secret"
    optional: true

  - id: gitlab_client_id
    type: string
    name: "GitLab Client ID"
    description: "GitLab OAuth App 的 Client ID"
    optional: true

  - id: gitlab_client_secret
    type: secret
    name: "GitLab Client Secret"
    description: "GitLab OAuth App 的 Client Secret"
    optional: true

  - id: gitea_server
    type: string
    name: "Gitea 服务器地址"
    description: "Gitea 平台的完整访问地址"
    optional: true

  - id: gitea_client_id
    type: string
    name: "Gitea Client ID"
    description: "Gitea OAuth App 的 Client ID"
    optional: true

  - id: gitea_client_secret
    type: secret
    name: "Gitea Client Secret"
    description: "Gitea OAuth App 的 Client Secret"
    optional: true

  - id: bitbucket_client_id
    type: string
    name: "Bitbucket Client ID"
    description: "Bitbucket OAuth Consumer 的 Key"
    optional: true

  - id: bitbucket_client_secret
    type: secret
    name: "Bitbucket Client Secret"
    description: "Bitbucket OAuth Consumer 的 Secret"
    optional: true

  # - id: admin_user
  #   type: string
  #   name: "管理员用户名"
  #   description: "Drone CI 管理员在 SCM 平台上的用户名"
  #   default_value: "admin"
  #   optional: true

