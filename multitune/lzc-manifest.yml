ext_config:
  enable_media_access: true
application:
  subdomain: multitune
  multi_instance: false
  background_task: true
  routes:
    - /=http://multitune:8080
services:
  multitune:
    image: registry.lazycat.cloud/ety001/ety001/multitune:b33f9d294fd14e86
    binds:
      - /lzcapp/var/data:/app/data
    environment:
      - DATA_PATH=/app/data
      - PORT=8080
