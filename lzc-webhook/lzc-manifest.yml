application:
  public_path:
    - /hooks
  subdomain: webhook
  background_task: true
  multi_instance: true
  routes:
    - /=http://webhook:8080

services:
  webhook:
    image: registry.lazycat.cloud/ety001/ety001/lzc-webhook:ad7544c0ec4f3db2
    runtime: sysbox-runc
    binds:
      - /lzcapp/var/conf:/data/conf
      - /lzcapp/var/scripts:/data/scripts
    environment:
      - TZ=Asia/Shanghai
      - LZC_ENCRYPTION_KEY={{ .U.encryption_key }}
